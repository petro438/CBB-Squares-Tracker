name: Update Squares Data

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:           # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        env:
          CBB_API_KEY: ${{ secrets.CBB_API_KEY }}
        run: python update-squares.py

            - name: Commit and push squares.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --hard origin/main
          git add squares.json
          git diff --staged --quiet || git commit -m "Update squares data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
