<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>March Madness Squares Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #00c358; --green-dark: #00a349;
      --navy: #0d1f2d; --navy-mid: #1a3044;
      --grey-cell: #e8ecf0; --grey-label: #8a9bb0;
      --grey-light: #f2f5f8; --text: #1a2332;
      --border: #d0d9e3; --white: #ffffff;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--white); color: var(--text); margin: 0; padding: 0; }
    .header { background: var(--navy); padding: 16px 20px 14px; border-bottom: 3px solid var(--green); }
    .header-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .title { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; color: var(--white); line-height: 1; }
    .title span { color: var(--green); }
    .season-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; background: var(--green); color: var(--navy); padding: 2px 7px; border-radius: 3px; }
    .meta { margin-top: 6px; display: flex; gap: 16px; flex-wrap: wrap; }
    .meta-item { font-size: 11px; color: var(--grey-label); font-weight: 500; }
    .meta-item strong { color: var(--white); font-weight: 600; }
    .live-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-right: 4px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .filters { padding: 12px 20px; background: var(--grey-light); border-bottom: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .filter-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--grey-label); margin-right: 4px; }
    .filter-btn { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 4px; border: 1.5px solid var(--border); background: var(--white); color: var(--grey-label); cursor: pointer; transition: all 0.15s; user-select: none; }
    .filter-btn:hover { border-color: var(--green); color: var(--text); }
    .filter-btn.active { background: var(--green); border-color: var(--green); color: var(--white); }
    .filter-btn.all-btn { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
    .main { padding: 16px 20px 24px; }
    .axis-row { margin-bottom: 4px; margin-left: 35px; }
    .axis-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--grey-label); }
    .grid-with-label { display: flex; gap: 6px; align-items: center; }
    .winner-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--grey-label); writing-mode: vertical-rl; transform: rotate(180deg); white-space: nowrap; }
    .grid-wrap { overflow-x: auto; }
    .grid-container { display: grid; grid-template-columns: 32px repeat(10, 1fr); gap: 3px; min-width: 380px; max-width: 560px; }
    .corner {}
    .col-header, .row-header { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; color: var(--grey-label); display: flex; align-items: center; justify-content: center; height: 28px; }
    .row-header { height: auto; }
    .cell { aspect-ratio: 1; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; transition: transform 0.15s; cursor: default; background: var(--grey-cell); color: transparent; position: relative; }
    .cell.active { background: var(--green); color: var(--navy); }
    .cell.active:hover { transform: scale(1.1); background: var(--green-dark); z-index: 10; }
    .cell[data-tip]:hover::after { content: attr(data-tip); position: absolute; bottom: calc(100% + 5px); left: 50%; transform: translateX(-50%); background: var(--navy); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; white-space: nowrap; padding: 4px 8px; border-radius: 4px; z-index: 100; pointer-events: none; }
    .games-count { margin-top: 10px; font-size: 12px; color: var(--grey-label); font-weight: 500; }
    .games-count strong { color: var(--text); font-weight: 700; }
    .recent { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 16px; }
    .section-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--grey-label); margin-bottom: 10px; }
    .game-list { display: flex; flex-direction: column; gap: 5px; }
    .game-row { display: flex; align-items: center; gap: 10px; padding: 7px 10px; background: var(--grey-light); border-radius: 5px; font-size: 12px; }
    .game-square { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 800; color: var(--green-dark); min-width: 32px; }
    .game-round { font-size: 11px; font-weight: 600; color: var(--grey-label); min-width: 80px; }
    .game-matchup { flex: 1; color: var(--text); font-weight: 500; }
    .game-score { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; color: var(--grey-label); white-space: nowrap; }
    .game-date { font-size: 11px; color: var(--grey-label); min-width: 36px; text-align: right; }
    .empty-state { text-align: center; padding: 28px 0; color: var(--grey-label); font-size: 13px; }
    .empty-state .big { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; display: block; margin-bottom: 4px; }
    .loading { display: flex; align-items: center; justify-content: center; height: 260px; color: var(--grey-label); font-size: 13px; gap: 8px; }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="title">March Madness <span>Squares</span></div>
    <div class="season-badge">2026 NCAA Tournament</div>
  </div>
  <div class="meta">
    <div class="meta-item"><span class="live-dot"></span>Auto-updates every 30 min</div>
    <div class="meta-item">Games played: <strong id="total-games">—</strong></div>
    <div class="meta-item">Last updated: <strong id="last-updated">—</strong></div>
  </div>
</div>

<div class="filters" id="filters" style="display:none">
  <span class="filter-label">Round:</span>
  <button class="filter-btn all-btn active" data-round="all">All</button>
</div>

<div class="main" id="main-content">
  <div class="loading"><div class="spinner"></div> Loading...</div>
</div>

<script>
const JSON_URL = './squares.json';
const ROUND_ORDER = ["First Four","Round of 64","Round of 32","Sweet 16","Elite 8","Final Four","Championship"];
let appData = null;
let activeRounds = new Set(['all']);

function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit', timeZoneName:'short' });
}

function formatShortDate(str) {
  if (!str) return '';
  const [y,m,d] = str.split('-');
  return `${parseInt(m)}/${parseInt(d)}`;
}

function mergeGrids(data, rounds) {
  if (rounds.has('all') || !data.rounds) return { grid: data.grid, total: data.totalGames };
  const merged = {};
  for (let w=0;w<10;w++) { merged[w]={}; for (let l=0;l<10;l++) merged[w][l]=0; }
  let total = 0;
  for (const round of rounds) {
    const rg = data.rounds[round];
    if (!rg) continue;
    for (let w=0;w<10;w++) for (let l=0;l<10;l++) {
      const v = parseInt(rg[w]?.[l]||0);
      merged[w][l] += v;
      total += v;
    }
  }
  const out = {};
  for (let w=0;w<10;w++) { out[String(w)]={};  for (let l=0;l<10;l++) out[String(w)][String(l)]=merged[w][l]; }
  return { grid: out, total };
}

function buildGrid(grid, total) {
  let h = `<div class="axis-row"><span class="axis-label">Loser's last digit →</span></div>
    <div class="grid-with-label">
    <div class="winner-label">Winner's last digit</div>
    <div class="grid-wrap"><div class="grid-container">
    <div class="corner"></div>`;
  for (let l=0;l<10;l++) h += `<div class="col-header">${l}</div>`;
  for (let w=0;w<10;w++) {
    h += `<div class="row-header">${w}</div>`;
    for (let l=0;l<10;l++) {
      const count = parseInt((grid[w]||{})[l]||0);
      const pct = total>0 ? ((count/total)*100).toFixed(1) : '0.0';
      const cls = count>0 ? 'cell active' : 'cell';
      const tip = count>0 ? `W=${w} / L=${l}: ${count} game${count!==1?'s':''} (${pct}%)` : `W=${w} / L=${l}: no games yet`;
      h += `<div class="${cls}" data-tip="${tip}">${count>0?count:''}</div>`;
    }
  }
  h += `</div></div></div>`;
  h += `<div class="games-count">Showing <strong>${total}</strong> game${total!==1?'s':''}</div>`;
  return h;
}

function buildRecentGames(games, rounds) {
  let filtered = (games||[]);
  if (!rounds.has('all')) filtered = filtered.filter(g => rounds.has(g.round));
  if (filtered.length===0) return `<div class="empty-state"><span class="big">${(games||[]).length===0?'Tournament hasn\'t started yet':'No games for selected rounds'}</span></div>`;
  return '<div class="game-list">'+filtered.slice(0,10).map(g=>`
    <div class="game-row">
      <div class="game-square">${g.square}</div>
      <div class="game-round">${g.round||''}</div>
      <div class="game-matchup">${g.winner} def. ${g.loser}</div>
      <div class="game-score">${g.winnerScore}–${g.loserScore}</div>
      <div class="game-date">${formatShortDate(g.date)}</div>
    </div>`).join('')+'</div>';
}

function buildFilters(data) {
  const el = document.getElementById('filters');
  if (!data.rounds||Object.keys(data.rounds).length===0) { el.style.display='none'; return; }
  el.style.display='flex';
  el.querySelectorAll('.round-btn').forEach(b=>b.remove());
  ROUND_ORDER.filter(r=>data.rounds[r]).forEach(round=>{
    const count = Object.values(data.rounds[round]).reduce((s,row)=>s+Object.values(row).reduce((a,b)=>a+parseInt(b||0),0),0);
    const btn = document.createElement('button');
    btn.className='filter-btn round-btn';
    btn.dataset.round=round;
    btn.textContent=`${round} (${count})`;
    btn.addEventListener('click',()=>toggleRound(round));
    el.appendChild(btn);
  });
}

function toggleRound(round) {
  if (round==='all') { activeRounds=new Set(['all']); }
  else {
    activeRounds.delete('all');
    if (activeRounds.has(round)) { activeRounds.delete(round); if (activeRounds.size===0) activeRounds=new Set(['all']); }
    else activeRounds.add(round);
  }
  document.querySelectorAll('.filter-btn').forEach(btn=>btn.classList.toggle('active',activeRounds.has(btn.dataset.round)));
  renderGrid();
}

function renderGrid() {
  if (!appData) return;
  const {grid,total} = mergeGrids(appData,activeRounds);
  document.getElementById('main-content').innerHTML = `
    ${buildGrid(grid,total)}
    <div class="recent">
      <div class="section-title">Recent Games</div>
      ${buildRecentGames(appData.recentGames,activeRounds)}
    </div>`;
}

async function loadData() {
  try {
    const resp = await fetch(`${JSON_URL}?t=${Date.now()}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    appData = await resp.json();
    document.getElementById('total-games').textContent = appData.totalGames??0;
    document.getElementById('last-updated').textContent = formatDate(appData.updated);
    buildFilters(appData);
    renderGrid();
  } catch(e) {
    document.getElementById('main-content').innerHTML=`<div class="loading" style="color:#cc0000">Failed to load — retrying...</div>`;
    setTimeout(loadData,10000);
  }
}

document.querySelector('.all-btn').addEventListener('click',()=>toggleRound('all'));
loadData();
setInterval(loadData, 5*60*1000);
</script>
</body>
</html>
